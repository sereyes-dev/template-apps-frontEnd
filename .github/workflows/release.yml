# =============================================================================
# .github/workflows/release.yml — Pipeline de release a producción
# =============================================================================
#
# Trigger: push de tags con formato semver (v1.0.0, v1.2.3-beta.1, etc.)
#
# Etapas:
#   1. validate  → verifica que el tag cumple semver y que el CI pasó
#   2. build     → next build optimizado para producción con variables reales
#   3. e2e-smoke → Playwright smoke tests (solo chromium, subset crítico)
#   4. deploy    → deploy a producción (Vercel/Docker — descomentar el que aplique)
#   5. notify    → crea GitHub Release con changelog automático
#
# Secretos requeridos en GitHub → Settings → Secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID  (si se usa Vercel)
#   E2E_USER_EMAIL, E2E_USER_PASSWORD                (smoke tests post-deploy)
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # v1.0.0
      - "v[0-9]+.[0-9]+.[0-9]+-*" # v1.0.0-beta.1, v1.0.0-rc.1

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Los releases nunca se cancelan

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: VALIDATE — Verifica que el CI pasó antes de hacer deploy
  # ---------------------------------------------------------------------------
  validate:
    name: Validate tag & CI status
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para acceder al historial de commits

      # Parsea el tag para extraer la versión y detectar pre-releases
      - name: Parse version from tag
        id: parse
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "📦 Version: $VERSION"

      # Verifica que el commit del tag tiene un CI exitoso en main/develop
      # Evita hacer deploy de código que no pasó los tests
      - name: Check CI status on tagged commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              check_name: 'CI',
            });
            const passed = checks.check_runs.some(c =>
              c.name === 'CI' && c.conclusion === 'success'
            );
            if (!passed) {
              core.setFailed(`❌ CI no ha pasado para el commit ${sha}. Abortando release.`);
            }

  # ---------------------------------------------------------------------------
  # JOB 2: BUILD — Build de producción con variables reales
  # ---------------------------------------------------------------------------
  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-release-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            nextjs-release-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            nextjs-release-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for production
        run: bun run build
        env:
          # Agregar aquí las variables NEXT_PUBLIC_* de producción
          # NEXT_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          NODE_ENV: production

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: production-build-${{ needs.validate.outputs.version }}
          path: |
            .next/
            public/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # JOB 3: E2E SMOKE — Tests críticos post-build antes de hacer deploy
  # Solo corre en chromium para ser rápido (~5 min)
  # Cubre los flujos críticos: login, homepage, rutas protegidas
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: Smoke tests (pre-deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: production-build-${{ needs.validate.outputs.version }}

      # Corre solo los tests etiquetados con @smoke
      # Marcar los tests críticos con: test.describe('@smoke', () => { ... })
      - name: Run smoke tests
        run: bunx playwright test --project=chromium --grep="@smoke"
        env:
          BASE_URL: http://localhost:3000
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload smoke test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-failure-${{ needs.validate.outputs.version }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14 # Retener más tiempo — es un fallo en producción

  # ---------------------------------------------------------------------------
  # JOB 4: DEPLOY — Deploy a producción
  # Descomentar el bloque que corresponda al proveedor del proyecto.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, e2e-smoke]
    environment: production # Requiere aprobación manual en GitHub Environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── OPCIÓN A: VERCEL ────────────────────────────────────────────────────
      # Descomentar este bloque si el proyecto se despliega en Vercel.
      # Secretos necesarios: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
      #
      - name: Deploy to Vercel (production)
        run: bunx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── OPCIÓN B: DOCKER + REGISTRY ─────────────────────────────────────────
      # Descomentar si el proyecto se conteneriza y despliega en un registry.
      # Secretos necesarios: REGISTRY_URL, REGISTRY_USER, REGISTRY_PASSWORD
      #
      # - name: Log in to container registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.REGISTRY_URL }}
      #     username: ${{ secrets.REGISTRY_USER }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}
      #
      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: |
      #       ${{ secrets.REGISTRY_URL }}/app:${{ needs.validate.outputs.version }}
      #       ${{ secrets.REGISTRY_URL }}/app:latest

      # Placeholder hasta configurar el proveedor de deploy
      - name: Deploy placeholder
        run: echo "🚀 Deploy de v${{ needs.validate.outputs.version }} a producción"

  # ---------------------------------------------------------------------------
  # JOB 5: NOTIFY — Crea GitHub Release con changelog automático
  # ---------------------------------------------------------------------------
  notify:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate, deploy]
    permissions:
      contents: write # Necesario para crear releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Genera changelog automático desde los commits Conventional Commits
      # entre el tag anterior y el nuevo
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate.outputs.version }}';
            const isPrerelease = '${{ needs.validate.outputs.is_prerelease }}' === 'true';

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              generate_release_notes: true,   // Changelog automático desde commits
              prerelease: isPrerelease,
              draft: false,
            });

            console.log(`✅ Release v${version} creado`);
