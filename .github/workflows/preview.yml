# =============================================================================
# .github/workflows/preview.yml — Deploy preview para Pull Requests
# =============================================================================
#
# Trigger: apertura, actualización y reapertura de Pull Requests a main/develop
#
# Qué hace:
#   1. Hace build del PR
#   2. Despliega en un entorno preview con URL única por PR
#   3. Corre un smoke test de Playwright contra la URL preview
#   4. Comenta en el PR con la URL preview + estado de los tests
#   5. Destruye el entorno cuando el PR se cierra o mergea
#
# Diferencia con ci.yml:
#   - ci.yml corre todos los tests (unitarios + E2E completos) en cada push
#   - preview.yml despliega y verifica el resultado visual en un entorno real
#
# Secretos requeridos:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID  (ajustar al proveedor)
#   E2E_USER_EMAIL, E2E_USER_PASSWORD
# =============================================================================

name: Preview

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: DEPLOY PREVIEW — Build + deploy del PR
  # Solo corre cuando el PR está abierto (no cuando se cierra)
  # ---------------------------------------------------------------------------
  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.action != 'closed'

    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-preview-${{ runner.os }}-${{ github.event.pull_request.number }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            nextjs-preview-${{ runner.os }}-${{ github.event.pull_request.number }}-${{ hashFiles('bun.lock') }}-
            nextjs-preview-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # ── OPCIÓN A: VERCEL PREVIEW ────────────────────────────────────────────
      # Genera una URL única por PR: https://proyecto-git-pr-123.vercel.app
      #
      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          DEPLOY_URL=$(bunx vercel --token=${{ secrets.VERCEL_TOKEN }} \
            --env NODE_ENV=preview \
            2>&1 | tail -1)
          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "🔗 Preview URL: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── OPCIÓN B: PLACEHOLDER ────────────────────────────────────────────────
      # Si no se usa Vercel, reemplazar el step anterior por el deploy al proveedor
      # y asegurarse de que 'preview_url' quede en $GITHUB_OUTPUT.
      #
      # - name: Deploy placeholder
      #   id: deploy
      #   run: echo "preview_url=https://preview-pr-${{ github.event.pull_request.number }}.example.com" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # JOB 2: SMOKE TEST — Playwright contra la URL preview
  # ---------------------------------------------------------------------------
  smoke-preview:
    name: Smoke test preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-preview]
    if: github.event.action != 'closed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      # Smoke tests contra la URL preview real (no localhost)
      # webServer NO se levanta porque BASE_URL apunta al preview ya desplegado
      - name: Run smoke tests against preview
        id: smoke
        run: bunx playwright test --project=chromium --grep="@smoke"
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload smoke test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-smoke-report-pr${{ github.event.pull_request.number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # JOB 3: COMMENT — Comentario en el PR con URL + estado
  # Corre siempre (aunque el smoke falle) para que el autor sepa la URL
  # ---------------------------------------------------------------------------
  comment-preview:
    name: Comment on PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-preview, smoke-preview]
    if: always() && github.event.action != 'closed'
    permissions:
      pull-requests: write

    steps:
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ needs.deploy-preview.outputs.preview_url }}';
            const smokeResult = '${{ needs.smoke-preview.result }}';
            const smokeIcon = smokeResult === 'success' ? '✅' : smokeResult === 'failure' ? '❌' : '⏭️';
            const smokeText = smokeResult === 'success'
              ? 'Smoke tests pasaron'
              : smokeResult === 'failure'
              ? 'Smoke tests fallaron — [ver reporte](../actions/runs/${{ github.run_id }})'
              : 'Smoke tests omitidos';

            const body = [
              `## 🔍 Preview desplegado`,
              ``,
              `| | |`,
              `|---|---|`,
              `| 🔗 **URL** | ${previewUrl} |`,
              `| ${smokeIcon} **Smoke tests** | ${smokeText} |`,
              `| 📦 **Commit** | \`${{ github.event.pull_request.head.sha }}\` |`,
              ``,
              `_Actualizado en cada push a esta rama._`,
            ].join('\n');

            // Buscar si ya hay un comentario de preview para actualizarlo
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview desplegado')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # JOB 4: CLEANUP — Destruye el entorno preview al cerrar/mergear el PR
  # ---------------------------------------------------------------------------
  cleanup-preview:
    name: Cleanup preview environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.action == 'closed'
    permissions:
      deployments: write

    steps:
      # Marca los deployments del PR como 'inactive' en GitHub
      - name: Deactivate preview deployments
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.ref,
            });

            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });
            }

            console.log(`🧹 ${deployments.length} deployments desactivados para PR #${{ github.event.pull_request.number }}`);
